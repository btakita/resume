# --- Per-profile content reframing ---

[[replace]]
find = "short-term freelance software projects"
text = "Full-stack .NET and cloud-native development with DevOps ownership - serverless APIs, containerized deployments, and infrastructure-as-code across diverse industries."

[[replace]]
find = "**Menu.com** - AWS CDK + Lambda serverless functions"
text = "- **Menu.com** - Architected .NET API services on AWS Fargate Windows containers with ECS. Built AWS CDK infrastructure-as-code and Lambda serverless functions. Docker, .NET, AWS CDK, Lambda, ECS, CloudWatch, IAM."

[[replace]]
find = "**SafeSchoolz (Aegis Platform)** - AI safety platform"
text = "- **SafeSchoolz (Aegis Platform)** - Built .NET backend services for AI safety platform. Gun detection model (~85% mAP). CI/CD pipeline setup, Docker containerization. .NET, Android, Python, Twilio."

[[replace]]
find = "**BestInform** - European information platform for structured data"
text = "- **BestInform** - Enterprise data platform with structured reports and analytics. Firebase-hosted with real-time messaging. Angular 14, Firebase. [bestinform.eu](https://bestinform.eu)"

[[replace]]
find = "**Guard App** - Security service platform connecting guards"
text = "- **Guard App** - Multi-tier service platform with Java Spring Boot backend, Docker-containerized services. Admin portal, mobile apps, incident reporting. Flutter, Angular, Firebase, Java Spring Boot."

[[replace]]
