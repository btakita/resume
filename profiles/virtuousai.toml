# Retarget the Summary for VirtuousAI: explainable + graph-backed AI, plus the
# hands-on small-business e-commerce execution experience. (agent-resume generates
# the summary line from data.toml; [[replace]] swaps the whole line post-build,
# matching on a unique substring.)
[[replace]]
find = "Architected a production real-time multimodal AI avatar pipeline at Presence AI"
text = "Full-stack engineer (20+ years) who builds explainable, graph-backed AI systems — and has run hands-on small-business e-commerce operations end to end. Architected a production real-time multimodal AI pipeline at Presence AI on NVIDIA H100 GPUs via WebRTC. Builds agent infrastructure in Rust: agent-doc — a white-box, real-time human+agent interaction surface — and tsift — a graph + vector knowledge substrate (code-RAG over a provider-neutral graph store). Hands-on small-business WooCommerce operations (MonsterRodHolders) and a Cloudflare Workers + D1 fintech platform (Equity Funding Source). Deep in Python, TypeScript, React, and LLM integration, with control-plane experience — lifecycle, scoped cancellation, and making systems legible to humans and agents alike."
