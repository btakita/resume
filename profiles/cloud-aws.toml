# --- Per-profile content reframing (Brian Takita section) ---

[[replace]]
find = "short-term freelance software projects"
text = "Cloud-native application development across AWS and GCP - serverless functions, managed containers, real-time cloud services, and infrastructure automation."

[[replace]]
find = "**Menu.com** - AWS CDK + Lambda serverless functions"
text = "- **Menu.com** - End-to-end AWS architecture: CDK infrastructure-as-code, Lambda serverless functions, Fargate Windows containers on ECS, IAM policy management. Food ordering platform. AWS CDK, Lambda, ECS, Docker."

[[replace]]
find = "**Drivemond** - Taxi and ride-hailing platform"
text = "- **Drivemond** - AWS-powered real-time ride-hailing platform with location services, GPS tracking, and live driver-passenger matching. Flutter, AWS."

[[replace]]
find = "**BestInform** - European information platform for structured data"
text = "- **BestInform** - Firebase/GCP-hosted enterprise data platform with real-time messaging, structured data analytics. Angular 14, Firebase. [bestinform.eu](https://bestinform.eu)"

[[replace]]
find = "**Guard App** - Security service platform connecting guards"
text = "- **Guard App** - Firebase cloud backend for security service platform. Real-time database, auth, and hosting for admin portal and mobile apps. Flutter, Angular, Firebase, Java Spring Boot."
