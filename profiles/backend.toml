# --- Per-profile content reframing (Brian Takita section) ---

[[replace]]
find = "short-term freelance software projects"
text = "Full-stack backend development across diverse industries - API design, real-time data systems, serverless architecture, and cloud deployment."

[[replace]]
find = "**Menu.com** - AWS CDK + Lambda serverless functions"
text = "- **Menu.com** - Serverless backend: AWS CDK + Lambda functions integrated with .NET API on ECS Fargate. IAM policy management, Docker containers. AWS, .NET, Docker."

[[replace]]
find = "**Guard App** - Security service platform connecting guards"
text = "- **Guard App** - Java Spring Boot backend for security service platform. REST APIs for patrol management, incident reporting, and NFC verification. Flutter, Angular, Firebase, Java Spring Boot."

[[replace]]
find = "**Drivemond** - Taxi and ride-hailing platform"
text = "- **Drivemond** - Real-time matching backend for ride-hailing platform. GPS tracking, driver-passenger pairing algorithms, location services. Flutter, AWS."

